<!-- ================= SCRIPTS ================= -->
<script>
  function setDateStuff() {
    // honestly reused most of this from the main page

    var now = new Date();

    var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    var d = now.getDate();

    // ordinal suffix (still confusing but works)
    var suffix = "th";
    if (d === 1 || d === 21 || d === 31) suffix = "st";
    else if (d === 2 || d === 22) suffix = "nd";
    else if (d === 3 || d === 23) suffix = "rd";

    var text = "Today is: " +
      days[now.getDay()] + ", " +
      months[now.getMonth()] + " " +
      d + suffix + ", " +
      now.getFullYear();

    var dateEl = document.getElementById("dynamic-date");
    if (dateEl) {
      dateEl.innerHTML = text;
    }

    // update footer year
    document.getElementById("footer-year").innerText = now.getFullYear();
  }

  function showPhone() {
    alert("Office: (713) 555-9100");
  }

  // I could've used DOMContentLoaded but onload works fine here
</script>
